<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="">
  <!-- Neutral, brand-free hero backdrop. It exists so a launchpad that did not upload a banner
       ships a plain gradient instead of prynt's photograph on somebody else's domain. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16161c"/>
      <stop offset="0.55" stop-color="#0e0e13"/>
      <stop offset="1" stop-color="#08080b"/>
    </linearGradient>
    <radialGradient id="v" cx="0.3" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#g)"/>
  <rect width="1200" height="400" fill="url(#v)"/>
</svg>
